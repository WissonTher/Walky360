<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walky360</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="./pannellum/style.css">
</head>
<body>
    <button id="guzik">Tryb głębi</button>
    <button id="zmiana_pietra">Piętro I</button>
    
    <div class="measurement-controls">
        <button id="tryb_pomiaru">Pomiar: OFF</button>
        <button id="usun_pomiary" class="hidden">Usuń pomiar</button>
    </div>
    
    <div id="panorama">
        <div id="controls">
            <div class="ctrl" id="pan-left">&#9664;</div>
            <div class="ctrl" id="pan-up">&#9650;</div>
            <div class="ctrl" id="pan-down">&#9660;</div>
            <div class="ctrl" id="pan-right">&#9654;</div>
            <div class="ctrl" id="zoom-in">&plus;</div>
            <div class="ctrl" id="zoom-out">&minus;</div>
            <div class="ctrl" id="fullscreen">&#x2922;</div>
        </div>
        
        <svg id="measurement-svg"></svg>
    </div>
    
    <div id="map-wrapper">
        <div id="map-container"></div>
    </div>
    
    <script type="module" src="./pannellum/pannellum.js"></script>
    <script type="module" src="./pannellum/map.js"></script>
</body>
</html>
