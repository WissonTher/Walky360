<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Anything</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #guzik {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 10;
                padding: 10px;
                background: rgba(255, 255, 255, 0.8);
                border: 1px solid #000000;
                cursor: pointer;
        }

        #zmiana_pietra {
                position: absolute;
                top:20px;
                right: 150px;
                z-index: 10;
                padding: 10px;
                background: rgba(255, 255, 255, 0.8);
                border: 1px solid #000000;
                cursor: pointer;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #panorama {
            width: 100vw;
            height: 100vh;
        }

        #map-wrapper {
        position: absolute;
        top: 60px;
        right: 20px;
        z-index: 10;
        border: 2px solid rgba(255, 255, 255, 0.8);
        background: #fff;

        width: 300px;
        height: 300px;
        resize: both;
        overflow: hidden;
        min-width: 150px;
        min-height: 150px;
        max-width: 80vw;
        max-height: 80vh;

        }

        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
    </style>
</head>
<body>
    <button id="guzik">Depth Nothing</button>
    <button id="zmiana_pietra">Zmień piętro na mapie</button>
    <div id="panorama"></div>
    <div id="map-wrapper">
        <div id="map-container"></div>
    </div>
    <script type="module" src="pannellum.js"></script>
    <script type="module" src="map.js"></script>
</body>
</html>
